services:
  madf:
    build: .
    container_name: madf-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=file:/app/data/madf.db
      - REDIS_URL=redis://localhost:6379/0
      - PYTHONPATH=/app
      - API_KEY=${API_KEY}
      - MODEL_NAME=${MODEL_NAME:-glm-4.5}
      - BASE_URL=${BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
    volumes:
      - madf_data:/app/data
    restart: always

volumes:
  madf_data: